setupVersion: 1
modelRoles: 
  vision: omniroute/combo/vision
  plan: "@slow"
  task: "@default"
  commit: "@smol"
  tiny: omniroute/combo/flash:high
  default: omniroute/combo/coding:high
  smol: omniroute/combo/budget:high
