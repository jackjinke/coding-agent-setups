setupVersion: 1
modelRoles: 
  alpha: omniroute/combo/coding-alpha
  beta: omniroute/combo/coding-beta
  default: "@alpha"
  smol: "@beta:high"
  designer: omniroute/combo/designer:xhigh
  task: "@beta:xhigh"
  plan: "@alpha:high"
  commit: "@smol"
  tiny: omniroute/combo/flash:high
  vision: omniroute/combo/vision
  advisor: "@beta:high"
  slow: omniroute/combo/reviewer
defaultThinkingLevel: auto
personality: pragmatic
compaction: 
  strategy: snapcompact
astGrep: 
  enabled: false
browser: 
  cmux: false
plan: 
  defaultOnStartup: false
task: 
  eager: preferred
  showResolvedModelBadge: true
commands: 
  enableClaudeUser: false
  enableClaudeProject: false
  enableOpencodeUser: false
  enableOpencodeProject: false
providers: 
  webSearch: exa
  tinyModel: lfm2-700m
  tinyModelDevice: gpu
tools: 
  approvalMode: yolo
advisor: 
  enabled: false
disabledProviders: 
  - claude
  - codex
  - opencode
  - ollama
exa: 
  enabled: true
secrets: 
  enabled: true
display: 
  shimmer: classic
modelRoleStorage: global
collab: 
  relayUrl: ""
share: 
  serverUrl: ""
symbolPreset: nerd
statusLine: 
  preset: custom
  leftSegments: 
    - model
    - mode
    - context_pct
    - git
  rightSegments: 
    - session_name
  segmentOptions: 
    model: 
      showThinkingLevel: true
    git: 
      showBranch: true
      showStaged: false
      showUnstaged: false
      showUntracked: false
  transparent: false
  sessionAccent: true
  compactThinkingLevel: true
  separator: powerline-thin
memory: 
  backend: "off"
bashInterceptor: 
  enabled: false